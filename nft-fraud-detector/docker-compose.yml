version: '3.8'

services:
  fraud-detector:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nft-fraud-detector
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    volumes:
      - ./src:/app/src
      - ./models:/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - fraud-detection-network

networks:
  fraud-detection-network:
    driver: bridge
