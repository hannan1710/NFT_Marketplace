version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_CHAIN_ID=${NEXT_PUBLIC_CHAIN_ID}
      - NEXT_PUBLIC_NFT_CONTRACT_ADDRESS=${NEXT_PUBLIC_NFT_CONTRACT_ADDRESS}
      - NEXT_PUBLIC_MARKETPLACE_CONTRACT_ADDRESS=${NEXT_PUBLIC_MARKETPLACE_CONTRACT_ADDRESS}
      - NEXT_PUBLIC_ETHEREUM_RPC_URL=${NEXT_PUBLIC_ETHEREUM_RPC_URL}
      - NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID=${NEXT_PUBLIC_WALLETCONNECT_PROJECT_ID}
      - NEXT_PUBLIC_VALIDATOR_API_URL=${NEXT_PUBLIC_VALIDATOR_API_URL}
      - NEXT_PUBLIC_PRICE_PREDICTOR_API_URL=${NEXT_PUBLIC_PRICE_PREDICTOR_API_URL}
      - NEXT_PUBLIC_FRAUD_DETECTOR_API_URL=${NEXT_PUBLIC_FRAUD_DETECTOR_API_URL}
      - NEXT_PUBLIC_TRUST_SCORE_API_URL=${NEXT_PUBLIC_TRUST_SCORE_API_URL}
      - NEXT_PUBLIC_EVENT_ORCHESTRATOR_API_URL=${NEXT_PUBLIC_EVENT_ORCHESTRATOR_API_URL}
    restart: unless-stopped
    networks:
      - nft-network

networks:
  nft-network:
    driver: bridge
